name: CI
on: [push, pull_request]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.9", "3.13"]
    runs-on: ${{ matrix.os }}
    env:
      INBOX_FAKE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Run test suite (stdlib only, FAKE mode)
        run: |
          for t in tests/test_*.py; do
            echo "== $t =="
            python3 "$t"
          done
          bash tests/test_settings_survive_upgrade.sh
